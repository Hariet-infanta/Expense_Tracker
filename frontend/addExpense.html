<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Transaction | Expense Tracker</title>

<style>
* {
    box-sizing: border-box;
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg, #43cea2, #185a9d);
}

.container {
    width:380px;
    padding:35px;
    border-radius:16px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    color:#fff;
    text-align:center;
}

h2 { margin-bottom:25px; }

.input-group {
    text-align:left;
    margin-bottom:15px;
}

.input-group label {
    font-size:13px;
    margin-bottom:5px;
    display:block;
    opacity:0.8;
}

input, select {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add { background:#00c9a7; color:#fff; }
.add:hover { background:#00b89c; }

.back { background:#fff; color:#333; }
.back:hover { background:#ddd; }

#errorMsg {
    color:#ff4d4d;
    margin-bottom:10px;
    display:none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Add Transaction 💸</h2>

    <div id="errorMsg"></div>

    <div class="input-group">
        <label>Description</label>
        <input id="desc" placeholder="Eg: Groceries, Salary..." />
    </div>

    <div class="input-group">
        <label>Amount</label>
        <input id="amount" type="number" placeholder ="Enter amount" />
    </div>

    <div class="input-group">
        <label>Category</label>
        <select id="categorySelect">
            <option value="Income">💰 Income</option>
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Bills">💡 Bills</option>
            <option value="Health">💊 Health</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Education">📚 Education</option>
            <option value="Travel">✈️ Travel</option>
            <option value="Other">📦 Other</option>
        </select>
    </div>

    <!-- ✅ CUSTOM DATE INPUT -->
    <div class="input-group">
        <label>Date (DD-MM-YYYY)</label>
        <input id="date" maxlength="10"/>
    </div>

    <button class="add" onclick="addExpense()">Add Transaction</button>
    <button class="back" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<script>
const userId = localStorage.getItem("userId");
if(!userId) window.location.href="login.html";


function getToday(){
    const d = new Date();
    return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}
document.getElementById("date").value = getToday();


document.getElementById("date").addEventListener("input", function(e){
    let v = e.target.value.replace(/\D/g,'');
    if(v.length > 2) v = v.slice(0,2) + '-' + v.slice(2);
    if(v.length > 5) v = v.slice(0,5) + '-' + v.slice(5,9);
    e.target.value = v;
});

async function addExpense(){
    const desc = document.getElementById("desc").value.trim();
    const amount = +document.getElementById("amount").value;
    const category = document.getElementById("categorySelect").value;
    const dateInput = document.getElementById("date").value;

    const errorDiv = document.getElementById("errorMsg");
    errorDiv.style.display="none";

    if(!desc || amount <= 0 || !dateInput){
        errorDiv.innerText="Fill all fields 😭";
        errorDiv.style.display="block";
        return;
    }

    // ✅ VALIDATE & CONVERT
    let parts = dateInput.split("-");
    if(parts.length !== 3){
        errorDiv.innerText="Use DD-MM-YYYY format 😭";
        errorDiv.style.display="block";
        return;
    }

    let [dd, mm, yyyy] = parts;

    dd = dd.padStart(2,'0');
    mm = mm.padStart(2,'0');

    if(dd > 31 || mm > 12 || yyyy.length !== 4){
        errorDiv.innerText="Invalid date 😭";
        errorDiv.style.display="block";
        return;
    }


    const date = `${yyyy}-${mm}-${dd}`;

    const type = (category === "Income") ? "income" : "expense";

    try{
        const res = await fetch("http://localhost:5000/transactions",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                userId,
                description: desc,
                amount,
                type,
                category,
                date
            })
        });

        const data = await res.json();

        if(data.success){
            window.location.href="dashboard.html";
        } else {
            errorDiv.innerText = data.message || "Something went wrong";
            errorDiv.style.display="block";
        }

    }catch(err){
        errorDiv.innerText="Server error 😵";
        errorDiv.style.display="block";
    }
}
</script>

</body>
</html>
