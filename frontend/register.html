<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Expense Tracker</title>
<style>
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #7d82ca, #8f91b8);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  
  .container {
    background: #fff;
    padding: 40px 50px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
  }

  h2 {
    margin-bottom: 30px;
    color: #333;
    font-weight: 600;
  }

 
  input {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.2s;
  }

  input:focus {
    outline: none;
    border-color: #6B73FF;
    box-shadow: 0 0 5px rgba(107,115,255,0.5);
  }

  
  button {
    width: 100%;
    padding: 12px;
    background: #6B73FF;
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #5a63e0;
  }

  /* ===== Links ===== */
  a {
    display: block;
    margin-top: 15px;
    color: #6B73FF;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
  }

  a:hover {
    text-decoration: underline;
  }

  /* ===== Error Message ===== */
  .error {
    color: red;
    margin-bottom: 15px;
    font-size: 14px;
    display: none;
  }

</style>
</head>
<body>
<div class="container">
  <h2>Create Account</h2>
  <div id="errorMsg" class="error">Error message</div>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <input id="confirmPassword" type="password" placeholder="Confirm Password" />
  <button onclick="register()">Register</button>
  <a href="login.html">Already have an account? Login here</a>
</div>

<script>
async function register() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();
    const errorDiv = document.getElementById("errorMsg");
    errorDiv.style.display = "none"; // hide error initially

    if(!username || !password || !confirmPassword) {
        errorDiv.innerText = "Please fill in all fields";
        errorDiv.style.display = "block";
        return;
    }

    if(password !== confirmPassword) {
        errorDiv.innerText = "Passwords do not match";
        errorDiv.style.display = "block";
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if(!data.success) {
            errorDiv.innerText = data.message || "Registration failed";
            errorDiv.style.display = "block";
            return;
        }

        // Successful registration → redirect to login
        alert("Registered successfully! Please login.");
        window.location.href = "login.html";

    } catch (err) {
        errorDiv.innerText = "Server error. Try again later.";
        errorDiv.style.display = "block";
        console.error(err);
    }
}
</script>
</body>
</html>
