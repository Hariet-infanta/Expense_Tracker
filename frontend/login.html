<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Expense Tracker</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #7d82ca, #8f91b8);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }


  .container {
    background: #fff;
    padding: 40px 50px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
  }

  h2 {
    margin-bottom: 30px;
    color: #333;
    font-weight: 600;
  }

  
  input {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.2s;
  }

  input:focus {
    outline: none;
    border-color: #6B73FF;
    box-shadow: 0 0 5px rgba(107,115,255,0.5);
  }

 
  button {
    width: 100%;
    padding: 12px;
    background: #6B73FF;
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #5a63e0;
  }

  
  a {
    display: block;
    margin-top: 15px;
    color: #6B73FF;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
  }

  a:hover {
    text-decoration: underline;
  }


  .error {
    color: red;
    margin-bottom: 15px;
    font-size: 14px;
    display: none;
  }

</style>
</head>
<body>
<div class="container">
  <h2>Expense Tracker Login</h2>
  <div id="errorMsg" class="error">Invalid credentials</div>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Login</button>
  <a href="register.html">New user? Register here</a>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorDiv = document.getElementById("errorMsg");
    errorDiv.style.display = "none"; 

    if(!username || !password) {
        errorDiv.innerText = "Please enter username and password";
        errorDiv.style.display = "block";
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!data.success) {
            errorDiv.innerText = "Invalid credentials";
            errorDiv.style.display = "block";
            return;
        }

        
        localStorage.setItem("userId", data.userId);
        window.location.href = "dashboard.html";

    } catch (err) {
        errorDiv.innerText = "Server error. Try again later.";
        errorDiv.style.display = "block";
        console.error(err);
    }
}
</script>
</body>
</html>
